name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ArtemSBulgakov/buildozer-action@v1
        id: build
        with:
          command: buildozer android release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: InkWarrior_APK
          path: ${{ steps.build.outputs.bin_dir }}/*.apk
